<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>FreeKickChallenge</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"
  >

  <link rel="shortcut icon" href="TemplateData/favicon.ico">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      outline: none;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(320px, 70vw);
      display: none;
      z-index: 20;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 16px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #fff;
      border-radius: 999px;
      transition: width 0.15s ease;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 30;
      display: none;
      max-width: 90vw;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
    }

    #unity-warning div {
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    /* Remove Unity default UI */
    #unity-footer,
    #unity-logo,
    #unity-logo-title-footer,
    #unity-fullscreen-button,
    #unity-build-title {
      display: none !important;
    }

    canvas {
      image-rendering: auto;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");

    function unityShowBanner(msg, type) {
      const warningBanner = document.querySelector("#unity-warning");

      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;

      if (type === "error") {
        div.style.background = "red";
        div.style.color = "white";
        div.style.padding = "10px";
      } else if (type === "warning") {
        div.style.background = "yellow";
        div.style.color = "black";
        div.style.padding = "10px";
      } else {
        div.style.background = "white";
        div.style.color = "black";
        div.style.padding = "10px";
      }

      warningBanner.appendChild(div);

      if (type !== "error") {
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      updateBannerVisibility();
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/v1.loader.js";

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/v1.data.unityweb",
      frameworkUrl: buildUrl + "/v1.framework.js.unityweb",
      codeUrl: buildUrl + "/v1.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "FreeKickChallenge",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,

      // Good balance between sharpness and performance.
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2)
    };

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = `${100 * progress}%`;
      })
        .then((unityInstance) => {
          loadingBar.style.display = "none";

          // Double click/tap to enter browser fullscreen.
          canvas.addEventListener("dblclick", () => {
            unityInstance.SetFullscreen(1);
          });
        })
        .catch((message) => {
          alert(message);
        });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
