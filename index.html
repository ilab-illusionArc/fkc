<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>FreeKickChallenge</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"
  >

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      outline: none;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      display: none;
      z-index: 10;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 16px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #ffffff;
      border-radius: 999px;
      transition: width 0.15s ease;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      max-width: 90vw;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
    }

    /* Hide Unity footer/header/logo/title/fullscreen UI */
    #unity-footer,
    #unity-logo,
    #unity-logo-title-footer,
    #unity-fullscreen-button,
    #unity-build-title {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {
      const warningBanner = document.querySelector("#unity-warning");

      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);

      if (type === "error") {
        div.style = "background: red; color: white; padding: 10px; border-radius: 8px;";
      } else {
        div.style =
          type === "warning"
            ? "background: yellow; color: black; padding: 10px; border-radius: 8px;"
            : "background: white; color: black; padding: 10px; border-radius: 8px;";

        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      updateBannerVisibility();
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/v1.loader.js";

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/v1.data.br",
      frameworkUrl: buildUrl + "/v1.framework.js.br",
      codeUrl: buildUrl + "/v1.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "FreeKickChallenge",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,

      // Better performance on mobile. Remove this line if you want maximum sharpness.
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2)
    };

    document.querySelector("#unity-loading-bar").style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width =
          100 * progress + "%";
      })
        .then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";

          // Optional: click/tap game once to enter browser fullscreen
          canvas.addEventListener("dblclick", () => {
            unityInstance.SetFullscreen(1);
          });
        })
        .catch((message) => {
          alert(message);
        });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
